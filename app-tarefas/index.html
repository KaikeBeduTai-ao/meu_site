<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Tarefas</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <main class="app-container">
        <div class="header-widget">
            <div class="time-container">
                <span id="time-display">--:--</span>
                <span id="date-display" class="date-text">A carregar data...</span>
            </div>
        </div>

        <h1>As Minhas Tarefas</h1>
        
        <div class="input-group">
            <input type="text" id="task-input" placeholder="Adicione uma nova tarefa...">
            <button id="add-btn">Adicionar</button>
        </div>

        <div class="controls-group">
            <input type="text" id="search-input" placeholder="Pesquisar tarefas...">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendentes</button>
                <button class="filter-btn" data-filter="completed">Concluídas</button>
            </div>
        </div>

        <ul id="task-list"></ul>

        <a href="../index.html" class="back-link">← Voltar ao Portfólio</a>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
